<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Valorant Premate</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0077ff,#ffffff);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
color:black;
}

.container{
width:400px;
background:rgba(255,255,255,0.9);
padding:25px;
border-radius:15px;
box-shadow:0 0 20px rgba(0,0,0,0.2);
text-align:center;
}

input,select{
width:90%;
padding:10px;
margin:8px 0;
border:none;
border-radius:8px;
background:#e6f0ff;
color:black;
}

button{
width:95%;
padding:10px;
border:none;
border-radius:8px;
background:#0077ff;
color:white;
cursor:pointer;
}

button:hover{
background:#005fcc;
}

.hidden{display:none;}

.card{
margin-top:15px;
padding:15px;
background:#f2f8ff;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

a{
color:#0077ff;
text-decoration:underline;
cursor:pointer;
}

.success{color:green;}
.error{color:red;}

</style>
</head>

<body>

<div class="container">

<h2>Valorant Premade</h2>

<div id="loginBox">

<input id="user" placeholder="Kullanıcı Adı">
<input id="pass" type="password" placeholder="Şifre">

<button onclick="login()">Giriş Yap</button>

<br><br>
<a onclick="showRegister()">Kayıt Ol</a>

</div>

<div id="registerBox" class="hidden">

<input id="newUser" placeholder="Yeni Kullanıcı">
<input id="newPass" type="password" placeholder="Yeni Şifre">

<button onclick="register()">Kayıt Ol</button>

<br><br>
<a onclick="showLogin()">Giriş Yap</a>

</div>

<div id="panel" class="hidden">

<h3>Premate Oluştur</h3>

<select id="mode">
<option>Derecesiz</option>
<option>Rekabete Dayalı</option>
</select>

<select id="rank">
<option>Demir</option>
<option>Bronz</option>
<option>Gümüş</option>
<option>Altın</option>
<option>Platin</option>
<option>Yücelik</option>
<option>Ölümsüzlük</option>
<option>Radyant</option>
</select>

<input id="code" placeholder="Grup Kodu">

<button onclick="post()">Paylaş</button>

<p id="limitMsg"></p>

<h3>Aktif Kodlar</h3>
<div id="posts"></div>

</div>

<p id="msg"></p>

</div>

<script>

function showRegister(){
loginBox.classList.add("hidden")
registerBox.classList.remove("hidden")
}

function showLogin(){
registerBox.classList.add("hidden")
loginBox.classList.remove("hidden")
}

function register(){
let u=newUser.value
let p=newPass.value
if(!u||!p){msg("Boş bırakma","error");return;}
localStorage.setItem("user",u)
localStorage.setItem("pass",p)
msg("Kayıt başarılı","success")
showLogin()
}

function login(){
let u=user.value
let p=pass.value
if(u===localStorage.getItem("user") && p===localStorage.getItem("pass")){
loginBox.classList.add("hidden")
registerBox.classList.add("hidden")
panel.classList.remove("hidden")
msg("Giriş başarılı","success")
loadPosts()
}else{
msg("Yanlış bilgiler","error")
}
}

function post(){

let today=new Date().toDateString()
let limitData=JSON.parse(localStorage.getItem("limitData")||"{}")

if(limitData.date!==today){
limitData={date:today,count:0}
}

if(limitData.count>=3){
limitMsg.innerText="Bugün sınıra ulaştınız ❌"
limitMsg.className="error"
return
}

let mode=modeSelect.value
let rank=rankSelect.value
let code=codeInput.value
let user=localStorage.getItem("user")

if(!code)return

let time=new Date().toLocaleTimeString()

let posts=JSON.parse(localStorage.getItem("posts")||"[]")
posts.unshift({user,mode,rank,code,time})
localStorage.setItem("posts",JSON.stringify(posts))

limitData.count++
localStorage.setItem("limitData",JSON.stringify(limitData))

limitMsg.innerText="Paylaşıldı"
limitMsg.className="success"

loadPosts()
}

function loadPosts(){

let posts=JSON.parse(localStorage.getItem("posts")||"[]")
let html=""

posts.forEach(p=>{
html+=`
<div class="card">
<b>${p.user}</b><br>
Mod: ${p.mode}<br>
Rank: ${p.rank}<br>
Kod: <b>${p.code}</b><br>
⏱ ${p.time}
</div>
`
})

postsDiv.innerHTML=html
}

function msg(text,type){
msgBox.innerText=text
msgBox.className=type
}

</script>

</body>
</html>
