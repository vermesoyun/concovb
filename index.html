<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>IP Bilgi Sorgu</title>

<style>

body{
background:#0f172a;
font-family:Arial;
color:white;
text-align:center;
padding-top:80px;
}

h1{
font-size:40px;
margin-bottom:30px;
animation: glow 2s infinite alternate;
}

@keyframes glow{
from{color:#38bdf8;}
to{color:#22c55e;}
}

.box{
background:#1e293b;
width:400px;
margin:auto;
padding:30px;
border-radius:15px;
box-shadow:0 0 20px #38bdf8;
animation: float 3s infinite ease-in-out;
}

@keyframes float{
0%{transform:translateY(0px);}
50%{transform:translateY(-10px);}
100%{transform:translateY(0px);}
}

.info{
margin:10px 0;
font-size:18px;
}

input{
padding:10px;
width:220px;
border-radius:8px;
border:none;
margin-top:15px;
}

button{
padding:10px 20px;
border:none;
background:#38bdf8;
border-radius:8px;
cursor:pointer;
margin-left:5px;
}

button:hover{
background:#0ea5e9;
}

</style>
</head>

<body>

<h1>IP Bilgi Sorgulama</h1>

<div class="box">

<input id="ipInput" placeholder="IP adresi gir">
<button onclick="searchIP()">Ara</button>

<div class="info">IP: <span id="ip">-</span></div>
<div class="info">Ülke: <span id="country">-</span></div>
<div class="info">Şehir: <span id="city">-</span></div>
<div class="info">Bölge: <span id="region">-</span></div>
<div class="info">Koordinat: <span id="coord">-</span></div>
<div class="info">İnternet Sağlayıcısı: <span id="isp">-</span></div>

</div>

<script>

async function getIP(){

let response = await fetch("https://ipapi.co/json/");
let data = await response.json();
showData(data);

}

async function searchIP(){

let ip=document.getElementById("ipInput").value;

if(ip==""){
getIP();
return;
}

let response = await fetch("https://ipapi.co/"+ip+"/json/");
let data = await response.json();
showData(data);

}

function showData(data){

document.getElementById("ip").innerText=data.ip;
document.getElementById("country").innerText=data.country_name;
document.getElementById("city").innerText=data.city;
document.getElementById("region").innerText=data.region;
document.getElementById("coord").innerText=data.latitude+" , "+data.longitude;
document.getElementById("isp").innerText=data.org;

}

getIP();

</script>

</body>
</html>
